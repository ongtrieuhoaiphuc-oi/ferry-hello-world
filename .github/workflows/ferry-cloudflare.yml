name: Ferry Cloudflare Demo
on:
  push:
    branches: [main, no-dokku]
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: Keep the ephemeral host online (1-350 minutes)
        required: false
        default: "350"
permissions:
  contents: read
concurrency:
  group: ferry-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      FERRY_ENV_RAW: ${{ secrets.FERRY_ENV }}
      KEEP_ALIVE_MINUTES: ${{ inputs.keep_alive_minutes || '350' }}
      FERRY_RUNTIME_CACHE: /tmp/ferry-runtime-cache
      FERRY_APP_CACHE: /tmp/ferry-app-cache
      FERRY_LOG_DIR: ${{ github.workspace }}/workflow-logs
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - name: Initialize structured logs
        run: |
          mkdir -p "$FERRY_LOG_DIR/steps" "$FERRY_LOG_DIR/apps/hello" "$FERRY_LOG_DIR/apps/hello2" "$FERRY_LOG_DIR/apps/omiroute" "$FERRY_LOG_DIR/system"
          node scripts/workflow-log.mjs event start "workflow initialized" | tee "$FERRY_LOG_DIR/steps/00-initialize.log"
      - name: Restore runtime images
        id: runtime_cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ferry-runtime-cache
          key: ferry-runtime-${{ runner.os }}-amd64-cloudflared-v1
      - name: Restore application images
        id: app_cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ferry-app-cache
          key: ferry-apps-${{ runner.os }}-${{ hashFiles('Dockerfile', 'package.json', 'server.js', 'apps/**/Dockerfile', 'apps/**/package.json', 'apps/**/server.js') }}
      - name: Load runtime and application images
        id: load_images
        run: node scripts/load-runtime-images.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/11-load-images.log"
      - name: Deploy and verify all apps
        id: deploy
        run: node scripts/deploy-compose.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/21-deploy.log"
      - name: Collect per-app and system diagnostics
        if: always()
        continue-on-error: true
        env:
          JOB_STATUS: ${{ job.status }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          RUNTIME_CACHE_HIT: ${{ steps.runtime_cache.outputs.cache-hit }}
          APP_CACHE_HIT: ${{ steps.app_cache.outputs.cache-hit }}
        run: node scripts/collect-diagnostics.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/90-diagnostics.log"
      - name: Upload complete workflow logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ferry-workflow-logs-${{ github.run_number }}-${{ github.run_attempt }}
          path: workflow-logs/
          if-no-files-found: error
          retention-days: 14
