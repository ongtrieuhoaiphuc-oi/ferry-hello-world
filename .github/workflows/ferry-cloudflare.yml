name: Ferry Cloudflare Demo

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: Keep the ephemeral Ferry host online (1-350 minutes)
        required: false
        default: "350"

permissions:
  contents: read

concurrency:
  group: ferry-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      FERRY_ENV_RAW: ${{ secrets.FERRY_ENV }}
      KEEP_ALIVE_MINUTES: ${{ inputs.keep_alive_minutes || '350' }}
      FERRY_RUNTIME_CACHE: /tmp/ferry-runtime-cache
      FERRY_APP_CACHE: /tmp/ferry-app-cache
      FERRY_LOG_DIR: ${{ github.workspace }}/workflow-logs
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Initialize structured logs
        run: |
          mkdir -p "$FERRY_LOG_DIR/steps" "$FERRY_LOG_DIR/apps/hello" "$FERRY_LOG_DIR/apps/hello2" "$FERRY_LOG_DIR/apps/omiroute" "$FERRY_LOG_DIR/system"
          echo '{"event":"start","ts":"'$(date -Is)'"}' > "$FERRY_LOG_DIR/events.jsonl"

      - name: Restore runtime images
        id: runtime-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ferry-runtime-cache
          key: ferry-runtime-${{ runner.os }}-amd64-dokku-0.37.7-v3

      - name: Restore application images
        id: app-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ferry-app-cache
          key: ferry-apps-${{ runner.os }}-${{ hashFiles('Dockerfile', 'package.json', 'server.js', 'apps/**/Dockerfile', 'apps/**/package.json', 'apps/**/server.js') }}

      - name: Load runtime and application images
        id: load_images
        run: |
          node --check scripts/load-runtime-images.mjs
          node scripts/load-runtime-images.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/10-load-images.log"

      - name: Save runtime images
        if: steps.runtime-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/ferry-runtime-cache
          key: ferry-runtime-${{ runner.os }}-amd64-dokku-0.37.7-v3

      - name: Save application images
        if: steps.app-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/ferry-app-cache
          key: ferry-apps-${{ runner.os }}-${{ hashFiles('Dockerfile', 'package.json', 'server.js', 'apps/**/Dockerfile', 'apps/**/package.json', 'apps/**/server.js') }}

      - name: Deploy and verify all apps
        id: deploy
        run: |
          node --check scripts/deploy-ferry.mjs
          node scripts/deploy-ferry.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/20-deploy.log"

      - name: Collect diagnostics
        if: always()
        continue-on-error: true
        env:
          JOB_STATUS: ${{ job.status }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          RUNTIME_CACHE_HIT: ${{ steps.runtime-cache.outputs.cache-hit }}
          APP_CACHE_HIT: ${{ steps.app-cache.outputs.cache-hit }}
        run: node scripts/collect-diagnostics.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/90-diagnostics.log"

      - name: Upload workflow logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ferry-workflow-logs-${{ github.run_number }}-${{ github.run_attempt }}
          path: workflow-logs/
          if-no-files-found: warn
          retention-days: 14
