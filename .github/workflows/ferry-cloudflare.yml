name: Ferry Cloudflare Demo
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: Keep the ephemeral Ferry host online (1-350 minutes)
        required: false
        default: "350"
permissions:
  contents: write
concurrency:
  group: ferry-${{ github.repository }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      FERRY_ENV_RAW: ${{ secrets.FERRY_ENV }}
      KEEP_ALIVE_MINUTES: ${{ inputs.keep_alive_minutes || '350' }}
      FERRY_IMAGE_CACHE: /tmp/ferry-image-cache
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: ferry-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/ferry-image-cache
          key: ferry-images-${{ runner.os }}-amd64-dokku-0.37.7-v1
      - name: Load Ferry Docker images
        run: zstd -dc "$FERRY_IMAGE_CACHE/images.tar.zst" | docker load
      - name: Patch Ferry for GitHub runner
        run: node scripts/patch-ferry-runtime.mjs
      - name: Deploy with Ferry through Cloudflare
        id: ferry-deploy
        continue-on-error: true
        shell: bash
        run: bash scripts/ferry-cloudflare-action.sh 2>&1 | tee /tmp/ferry-deploy.log
      - name: Publish sanitized failure diagnostics
        if: steps.ferry-deploy.outcome == 'failure'
        shell: bash
        run: |
          { echo '# Ferry failure diagnostics'; echo '```text'; tail -n 220 /tmp/ferry-deploy.log | sed -E 's/(X-Auth-Key:|Authorization: Bearer|TUNNEL_TOKEN=).*/\1 [REDACTED]/Ig'; echo '```'; } > ferry-diagnostic.md
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add ferry-diagnostic.md
          git commit -m 'Record Ferry diagnostics [skip ci]'
          git push origin HEAD:main
          exit 1
      - name: Confirm public deployment
        if: steps.ferry-deploy.outcome == 'success'
        run: echo "Ferry is publicly reachable"
