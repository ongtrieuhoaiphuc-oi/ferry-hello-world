name: OmniRoute Cloudflare Demo

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: Keep OmniRoute online (1-350 minutes)
        required: false
        default: "350"

permissions:
  contents: read

concurrency:
  group: omniroute-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      FERRY_ENV_RAW: ${{ secrets.FERRY_ENV }}
      KEEP_ALIVE_MINUTES: ${{ inputs.keep_alive_minutes || '350' }}
      FERRY_RUNTIME_CACHE: /tmp/ferry-runtime-cache
      FERRY_APP_CACHE: /tmp/omniroute-app-cache
      FERRY_LOG_DIR: ${{ github.workspace }}/workflow-logs
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize logs
        run: mkdir -p "$FERRY_LOG_DIR/steps" "$FERRY_LOG_DIR/apps/omiroute" "$FERRY_LOG_DIR/system"

      - name: Restore runtime images
        id: runtime-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ferry-runtime-cache
          key: omniroute-runtime-${{ runner.os }}-dokku-0.37.7-v1

      - name: Restore OmniRoute image
        id: app-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/omniroute-app-cache
          key: omniroute-image-${{ runner.os }}-${{ hashFiles('apps/omiroute/**') }}

      - name: Load images
        id: load
        run: |
          node --check scripts/load-runtime-images.mjs
          node scripts/load-runtime-images.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/10-load-images.log"

      - name: Save runtime images
        if: steps.runtime-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/ferry-runtime-cache
          key: omniroute-runtime-${{ runner.os }}-dokku-0.37.7-v1

      - name: Save OmniRoute image
        if: steps.app-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/omniroute-app-cache
          key: omniroute-image-${{ runner.os }}-${{ hashFiles('apps/omiroute/**') }}

      - name: Deploy OmniRoute
        id: deploy
        run: |
          node --check scripts/deploy-ferry.mjs
          node scripts/deploy-ferry.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/20-deploy.log"

      - name: Collect diagnostics
        if: always()
        continue-on-error: true
        env:
          JOB_STATUS: ${{ job.status }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          RUNTIME_CACHE_HIT: ${{ steps.runtime-cache.outputs.cache-hit }}
          APP_CACHE_HIT: ${{ steps.app-cache.outputs.cache-hit }}
        run: node scripts/collect-diagnostics.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/90-diagnostics.log"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omniroute-workflow-logs-${{ github.run_number }}-${{ github.run_attempt }}
          path: workflow-logs/
          if-no-files-found: warn
          retention-days: 14
