name: Ferry Cloudflare Demo
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: Keep the ephemeral Ferry host online (1-350 minutes)
        required: false
        default: "350"
permissions:
  contents: write
concurrency:
  group: ferry-${{ github.repository }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      FERRY_ENV_RAW: ${{ secrets.FERRY_ENV }}
      KEEP_ALIVE_MINUTES: ${{ inputs.keep_alive_minutes || '350' }}
      FERRY_IMAGE_CACHE: /tmp/ferry-image-cache
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: ferry-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ferry-image-cache
          key: ferry-images-${{ runner.os }}-amd64-dokku-0.37.7-v1
      - name: Load Ferry Docker images
        run: node scripts/load-runtime-images.mjs
      - name: Repair and validate deploy module
        run: |
          node --input-type=module -e "import{readFileSync,writeFileSync}from'node:fs';const p='scripts/deploy-ferry.mjs';let s=readFileSync(p,'utf8');s=s.replace(\"Object.assign(process.env, parseEnv(readFileSync(join(root, '.env'), 'utf8'));\",\"Object.assign(process.env, parseEnv(readFileSync(join(root, '.env'), 'utf8')));\");writeFileSync(p,s)"
          node --check scripts/deploy-ferry.mjs
      - name: Deploy through Ferry
        run: node scripts/deploy-ferry.mjs
