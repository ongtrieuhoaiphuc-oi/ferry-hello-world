name: Ferry Cloudflare Demo

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: Keep both ephemeral apps online (1-350 minutes)
        required: false
        default: "350"

permissions:
  contents: read

concurrency:
  group: ferry-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      FERRY_ENV_RAW: ${{ secrets.FERRY_ENV }}
      KEEP_ALIVE_MINUTES: ${{ inputs.keep_alive_minutes || '350' }}
      FERRY_IMAGE_CACHE: /tmp/ferry-image-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Restore Ferry runtime images
        id: ferry-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ferry-image-cache
          key: ferry-runtime-${{ runner.os }}-amd64-dokku-0.37.7-v2
      - name: Load or download Ferry runtime images
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$FERRY_IMAGE_CACHE"
          archive="$FERRY_IMAGE_CACHE/runtime.tar.zst"
          if [[ -s "$archive" ]]; then zstd -dc "$archive" | docker load
          else
            docker pull dokku/dokku:0.37.7
            docker pull cloudflare/cloudflared:latest
            docker save dokku/dokku:0.37.7 cloudflare/cloudflared:latest | zstd -T0 -3 -o "$archive"
          fi
      - name: Save Ferry runtime images
        if: steps.ferry-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/ferry-image-cache
          key: ferry-runtime-${{ runner.os }}-amd64-dokku-0.37.7-v2
      - name: Deploy hello and hello2 through Ferry
        id: deploy
        continue-on-error: true
        shell: bash
        run: |
          set +e
          bash scripts/deploy-ferry.sh 2>&1 | tee /tmp/ferry-deploy.log
          exit ${PIPESTATUS[0]}
      - name: Report sanitized deploy failure
        if: steps.deploy.outcome == 'failure'
        shell: bash
        run: |
          tail -n 80 /tmp/ferry-deploy.log | sed -E 's/(X-Auth-Key:|Authorization: Bearer|TUNNEL_TOKEN=).*/\1 [REDACTED]/Ig' > /tmp/ferry-error.txt
          message=$(tr '\n' ' ' < /tmp/ferry-error.txt | cut -c1-4000)
          echo "::error title=Ferry deploy failed::$message"
          exit 1
