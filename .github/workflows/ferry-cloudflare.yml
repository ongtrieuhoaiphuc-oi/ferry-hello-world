name: Ferry Cloudflare Demo

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: Keep ephemeral apps online (1-350 minutes)
        required: false
        default: "350"

permissions:
  contents: read

concurrency:
  group: ferry-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      FERRY_ENV_RAW: ${{ secrets.FERRY_ENV }}
      KEEP_ALIVE_MINUTES: ${{ inputs.keep_alive_minutes || '350' }}
      FERRY_IMAGE_CACHE: /tmp/ferry-image-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Restore Ferry runtime images
        id: ferry-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ferry-image-cache
          key: ferry-runtime-${{ runner.os }}-amd64-dokku-0.37.7-v2
      - name: Load Ferry runtime images
        run: node scripts/load-runtime-images.mjs
      - name: Save Ferry runtime images
        if: steps.ferry-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/ferry-image-cache
          key: ferry-runtime-${{ runner.os }}-amd64-dokku-0.37.7-v2
      - name: Deploy all apps through Ferry
        id: deploy
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/deploy-ferry.mjs 2>&1 | tee /tmp/mjs-deploy.log
      - name: Report MJS deploy failure
        if: steps.deploy.outcome == 'failure'
        run: |
          message=$(tail -n 100 /tmp/mjs-deploy.log | tr '\n' ' ' | cut -c1-6000)
          echo "::error title=MJS deploy failed::$message"
          exit 1
