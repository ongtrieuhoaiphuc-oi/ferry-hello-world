name: Ferry Cloudflare Demo

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: Keep the ephemeral Ferry host online (1-350 minutes)
        required: false
        default: "350"

permissions:
  contents: read

concurrency:
  group: ferry-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      FERRY_ENV_RAW: ${{ secrets.FERRY_ENV }}
      KEEP_ALIVE_MINUTES: ${{ inputs.keep_alive_minutes || '350' }}
      FERRY_IMAGE_CACHE: /tmp/ferry-image-cache
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore Ferry Docker image cache
        id: ferry-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/ferry-image-cache
          key: ferry-images-${{ runner.os }}-amd64-dokku-0.37.7-v1

      - name: Load or warm Ferry Docker images
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$FERRY_IMAGE_CACHE"
          archive="$FERRY_IMAGE_CACHE/images.tar.zst"
          if [[ -s "$archive" ]]; then
            echo "Loading Ferry images from cache"
            zstd -dc "$archive" | docker load
          else
            docker pull dokku/dokku:0.37.7
            docker pull cloudflare/cloudflared:latest
            docker save dokku/dokku:0.37.7 cloudflare/cloudflared:latest | zstd -T0 -3 -o "$archive"
          fi
          docker image inspect dokku/dokku:0.37.7 >/dev/null
          docker image inspect cloudflare/cloudflared:latest >/dev/null

      - name: Save Ferry Docker image cache
        if: steps.ferry-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/ferry-image-cache
          key: ferry-images-${{ runner.os }}-amd64-dokku-0.37.7-v1

      - name: Apply Dokku compatibility fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/ferry-cloudflare-action.sh')
          source = path.read_text()
          old = 'docker exec dokku dokku network:set --global attach-post-deploy webserver\n'
          new = '''if ! docker exec dokku dokku network:set --global attach-post-deploy webserver; then
            configured="$(docker exec dokku dokku network:report --global 2>/dev/null || true)"
            grep -q 'webserver' <<< "$configured" || die "Dokku could not configure attach-post-deploy"
          fi
          '''
          if old not in source:
              raise SystemExit('Dokku setup line not found')
          path.write_text(source.replace(old, new))
          PY

      - name: Deploy with Ferry through Cloudflare
        shell: bash
        run: |
          set +e
          bash scripts/ferry-cloudflare-action.sh 2>&1 | tee /tmp/ferry-deploy.log
          status=${PIPESTATUS[0]}
          if (( status != 0 )); then
            {
              echo '### Ferry deploy diagnostics'
              echo '```text'
              tail -n 80 /tmp/ferry-deploy.log \
                | sed -E 's/(X-Auth-Key:|Authorization: Bearer|TUNNEL_TOKEN=).*/\1 [REDACTED]/Ig'
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$status"
