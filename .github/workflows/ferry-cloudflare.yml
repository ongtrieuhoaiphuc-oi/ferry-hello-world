name: Ferry Cloudflare Demo
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: Keep the ephemeral Ferry host online (1-350 minutes)
        required: false
        default: "350"
permissions:
  contents: read
concurrency:
  group: ferry-${{ github.repository }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      FERRY_ENV_RAW: ${{ secrets.FERRY_ENV }}
      KEEP_ALIVE_MINUTES: ${{ inputs.keep_alive_minutes || '350' }}
      FERRY_RUNTIME_CACHE: /tmp/ferry-runtime-cache
      FERRY_APP_CACHE: /tmp/ferry-app-cache
      FERRY_LOG_DIR: ${{ github.workspace }}/workflow-logs
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - name: Initialize structured logs
        run: |
          mkdir -p "$FERRY_LOG_DIR/steps" "$FERRY_LOG_DIR/apps/hello" "$FERRY_LOG_DIR/apps/hello2" "$FERRY_LOG_DIR/apps/omiroute" "$FERRY_LOG_DIR/system"
          node scripts/workflow-log.mjs event start "workflow initialized" | tee "$FERRY_LOG_DIR/steps/00-initialize.log"
      - name: Restore Ferry runtime images
        id: runtime_cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ferry-runtime-cache
          key: ferry-runtime-${{ runner.os }}-amd64-dokku-0.37.7-v3
      - name: Restore application images
        id: app_cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ferry-app-cache
          key: ferry-apps-${{ runner.os }}-${{ hashFiles('Dockerfile', 'package.json', 'server.js', 'apps/**/Dockerfile', 'apps/**/package.json', 'apps/**/server.js') }}
      - name: Load runtime and application images
        id: load_images
        shell: bash
        run: |
          set -o pipefail
          node --check scripts/load-runtime-images.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/10-syntax-load-images.log"
          node scripts/load-runtime-images.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/11-load-images.log"
      - name: Patch strict routing checks and validate
        run: |
          node --input-type=module - <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const path = 'scripts/deploy-ferry.mjs';
          let source = readFileSync(path, 'utf8');
          const ingressBefore = "const ingress = apps.map((app) => ({ hostname: app.host, service: 'http://dokku:80' }));";
          const ingressAfter = "const ingress = apps.map((app) => ({ hostname: app.host, service: 'http://dokku:80', originRequest: { httpHostHeader: app.host } }));";
          const omniBefore = "health: '/api/monitoring/health', marker: null";
          const omniAfter = "health: '/', marker: 'OmniRoute'";
          if (!source.includes(ingressBefore)) throw new Error('Cloudflare ingress marker missing');
          if (!source.includes(omniBefore)) throw new Error('OmniRoute probe marker missing');
          source = source.replace(ingressBefore, ingressAfter).replace(omniBefore, omniAfter);
          writeFileSync(path, source);
          NODE
          node --check scripts/deploy-ferry.mjs
      - name: Deploy and verify all apps
        id: deploy
        shell: bash
        run: |
          set -o pipefail
          node scripts/deploy-ferry.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/21-deploy.log"
      - name: Collect per-app and system diagnostics
        if: always()
        continue-on-error: true
        env:
          JOB_STATUS: ${{ job.status }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          LOAD_IMAGES_OUTCOME: ${{ steps.load_images.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          RUNTIME_CACHE_HIT: ${{ steps.runtime_cache.outputs.cache-hit }}
          APP_CACHE_HIT: ${{ steps.app_cache.outputs.cache-hit }}
        run: node scripts/collect-diagnostics.mjs 2>&1 | tee "$FERRY_LOG_DIR/steps/90-diagnostics.log"
      - name: Upload complete workflow logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ferry-workflow-logs-${{ github.run_number }}-${{ github.run_attempt }}
          path: workflow-logs/
          if-no-files-found: error
          retention-days: 14
      - name: Publish artifact summary
        if: always()
        run: echo "Artifact ferry-workflow-logs-${{ github.run_number }}-${{ github.run_attempt }}" >> "$GITHUB_STEP_SUMMARY"
