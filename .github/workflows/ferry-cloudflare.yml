name: Ferry Cloudflare Demo

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: Keep the ephemeral Ferry host online (1-350 minutes)
        required: false
        default: "350"

permissions:
  contents: read

concurrency:
  group: ferry-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      FERRY_ENV_RAW: ${{ secrets.FERRY_ENV }}
      KEEP_ALIVE_MINUTES: ${{ inputs.keep_alive_minutes || '350' }}
      FERRY_RUNTIME_CACHE: /tmp/ferry-runtime-cache
      FERRY_APP_CACHE: /tmp/ferry-app-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Restore Ferry runtime images
        id: runtime-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ferry-runtime-cache
          key: ferry-runtime-${{ runner.os }}-amd64-dokku-0.37.7-v3

      - name: Restore application images
        id: app-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ferry-app-cache
          key: ferry-apps-${{ runner.os }}-${{ hashFiles('Dockerfile', 'package.json', 'server.js', 'apps/**/Dockerfile', 'apps/**/package.json', 'apps/**/server.js') }}

      - name: Load runtime and build apps in parallel
        run: node --check scripts/load-runtime-images.mjs && node scripts/load-runtime-images.mjs

      - name: Save Ferry runtime images
        if: steps.runtime-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/ferry-runtime-cache
          key: ferry-runtime-${{ runner.os }}-amd64-dokku-0.37.7-v3

      - name: Save application images
        if: steps.app-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/ferry-app-cache
          key: ferry-apps-${{ runner.os }}-${{ hashFiles('Dockerfile', 'package.json', 'server.js', 'apps/**/Dockerfile', 'apps/**/package.json', 'apps/**/server.js') }}

      - name: Validate deployment module
        run: node --check scripts/deploy-ferry.mjs

      - name: Deploy all apps in parallel
        run: node scripts/deploy-ferry.mjs
